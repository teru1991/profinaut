[metrics]
max_unique_series_per_metric = 2000
max_total_unique_series = 20000
on_exceed = "drop"  # drop|aggregate|sample

[logs]
max_event_fields = 64
max_event_bytes = 8192
max_unique_field_keys = 512
on_exceed = "truncate"  # truncate|drop

[health]
degrade_on_budget_exceed = true
reason_code = "OBS_BUDGET_EXCEEDED"
