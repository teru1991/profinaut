exchange_id = "gmocoin"
support_level = "full"

# subscribe/unsubscribe: max 1 req/sec (official docs)
[rate]
messages_per_second = 1
messages_per_hour = 3600

[heartbeat]
ping_interval_secs = 20
idle_timeout_secs = 30

entitlement = "public_only"

[safety_profile]
max_streams_per_conn = 25
max_symbols_per_conn = 50

# optional direct overrides
max_streams_per_conn = 25
max_symbols_per_conn = 50

[stability.buckets]
public_rps = 1.0
private_rps = 1.0
control_rps = 2.0
min_gap_ms = 0

[stability.rate_limit]
max_attempts = 20
base_cooldown_secs = 1
max_cooldown_secs = 60
default_penalty_ms = 500

[stability.circuit_breaker]
failure_threshold = 5
success_threshold = 2
cooldown_ms = 20000
half_open_max_trials = 3

[stability.overflow]
mode = "slowdown_then_drop_oldest_low_priority"
slowdown_max_wait_ms = 200

[stability.stale]
stale_after_secs = 60
sweep_interval_ms = 5000
max_batch = 200

[stability.graceful]
drain_timeout_ms = 5000
join_timeout_ms = 5000
